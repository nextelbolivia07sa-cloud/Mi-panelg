<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Luhn Validator Tool</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background:#0f0f14;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
padding:40px;
}

.container{
width:900px;
background:#14141c;
padding:25px;
border-radius:10px;
box-shadow:0 0 20px #000;
}

h1{
text-align:center;
margin-bottom:20px;
}

textarea{
width:100%;
height:180px;
background:#0b0b10;
border:1px solid #333;
color:#00ffd0;
padding:10px;
font-family:monospace;
}

button{
margin-top:15px;
width:100%;
padding:14px;
background:#7c3aed;
border:none;
color:white;
font-size:16px;
cursor:pointer;
border-radius:6px;
}

button:hover{
background:#6d28d9;
}

.stats{
display:flex;
gap:20px;
margin-top:15px;
font-size:18px;
}

.result{
margin-top:20px;
background:#0a0a0f;
padding:15px;
height:220px;
overflow:auto;
font-family:monospace;
border:1px solid #222;
}

.valid{
color:#00ff9c;
}

.invalid{
color:#ff4d4d;
}

</style>
</head>

<body>

<div class="container">

<h1>Luhn Validator</h1>

<textarea id="input" placeholder="Ejemplo:
4111111111111111
5500000000000004
1234567890123456"></textarea>

<button onclick="checkNumbers()">VALIDAR</button>

<div class="stats">
<div>✔ Válidos: <span id="validCount">0</span></div>
<div>✖ Inválidos: <span id="invalidCount">0</span></div>
</div>

<div class="result" id="result"></div>

</div>

<script>

function luhnCheck(number){

let arr = number.split('').reverse().map(x => parseInt(x))
let sum = 0

for(let i=0;i<arr.length;i++){

let digit = arr[i]

if(i % 2 !== 0){
digit *= 2
if(digit > 9) digit -= 9
}

sum += digit
}

return sum % 10 === 0
}

function checkNumbers(){

let lines = document.getElementById("input").value.split("\n")

let resultBox = document.getElementById("result")

let valid = 0
let invalid = 0

resultBox.innerHTML = ""

lines.forEach(line => {

let num = line.trim()

if(num === "") return

if(luhnCheck(num)){

resultBox.innerHTML += `<div class="valid">✔ VALID → ${num}</div>`
valid++

}else{

resultBox.innerHTML += `<div class="invalid">✖ INVALID → ${num}</div>`
invalid++

}

})

document.getElementById("validCount").innerText = valid
document.getElementById("invalidCount").innerText = invalid

}

</script>

</body>
</html>
