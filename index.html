<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Luhn Bulk Validator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:#050505;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
padding:40px;
}

.container{
width:900px;
background:#0a0a0a;
padding:25px;
border-radius:10px;
box-shadow:0 0 20px #ff000080;
}

h1{
text-align:center;
color:#ff0000;
text-shadow:0 0 10px #ff0000;
}

textarea{
width:100%;
height:180px;
background:#000;
border:1px solid #ff000050;
color:#ff6666;
padding:10px;
font-family:monospace;
}

button{
margin-top:15px;
width:100%;
padding:14px;
background:#ff0000;
border:none;
color:white;
font-size:16px;
cursor:pointer;
border-radius:6px;
}

button:hover{
background:#cc0000;
}

.stats{
margin-top:15px;
display:flex;
gap:20px;
}

.result{
margin-top:20px;
background:#000;
padding:15px;
height:250px;
overflow:auto;
font-family:monospace;
border:1px solid #222;
}

.valid{
color:#00ff9c;
}

.invalid{
color:#ff4d4d;
}

.progress{
margin-top:10px;
height:10px;
background:#222;
border-radius:5px;
overflow:hidden;
}

.bar{
height:10px;
width:0%;
background:#ff0000;
}

</style>
</head>

<body>

<div class="container">

<h1>LUHN BULK VALIDATOR</h1>

<textarea id="input" placeholder="Pega números aquí"></textarea>

<button onclick="startCheck()">VALIDAR LISTA</button>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="stats">
<div>✔ Válidos: <span id="validCount">0</span></div>
<div>✖ Inválidos: <span id="invalidCount">0</span></div>
</div>

<div class="result" id="result"></div>

</div>

<script>

// LUHN
function luhnCheck(num){

let arr=num.split('').reverse().map(x=>parseInt(x))
let sum=0

for(let i=0;i<arr.length;i++){

let digit=arr[i]

if(i%2!==0){
digit*=2
if(digit>9) digit-=9
}

sum+=digit
}

return sum%10===0
}

// BULK PROCESS
function startCheck(){

let lines=document.getElementById("input").value.split("\n")

let valid=0
let invalid=0
let index=0

const batchSize=50

let result=document.getElementById("result")
result.innerHTML=""

function processBatch(){

let end=Math.min(index+batchSize,lines.length)

for(;index<end;index++){

let num=lines[index].trim()

if(!num) continue

if(luhnCheck(num)){

valid++
result.innerHTML+=`<div class="valid">✔ VALID → ${num}</div>`

}else{

invalid++
result.innerHTML+=`<div class="invalid">✖ INVALID → ${num}</div>`

}

}

document.getElementById("validCount").innerText=valid
document.getElementById("invalidCount").innerText=invalid

let progress=(index/lines.length)*100
document.getElementById("bar").style.width=progress+"%"

result.scrollTop=result.scrollHeight

if(index<lines.length){

setTimeout(processBatch,50)

}

}

processBatch()

}

</script>

</body>
</html>
