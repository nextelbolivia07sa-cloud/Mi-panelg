<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cyber Validator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:#020202;
color:#ff2a2a;
font-family:monospace;
overflow:hidden;
}

#particles{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-1;
}

.container{
width:900px;
margin:auto;
margin-top:40px;
background:#050505;
padding:25px;
border:1px solid #ff000040;
box-shadow:0 0 20px #ff000060;
border-radius:8px;
}

h1{
text-align:center;
text-shadow:0 0 10px #ff0000,0 0 30px #ff0000;
}

textarea{
width:100%;
height:180px;
background:#000;
color:#ff4444;
border:1px solid #ff000040;
padding:10px;
font-family:monospace;
}

button{
width:100%;
margin-top:10px;
padding:12px;
background:#ff0000;
border:none;
color:white;
cursor:pointer;
box-shadow:0 0 10px #ff0000;
}

button:hover{
box-shadow:0 0 20px #ff0000;
}

.result{
margin-top:20px;
height:250px;
overflow:auto;
background:#000;
padding:10px;
border:1px solid #ff000030;
}

.valid{
color:#00ff9c;
text-shadow:0 0 5px #00ff9c;
}

.invalid{
color:#ff4444;
text-shadow:0 0 5px #ff0000;
}

.stats{
display:flex;
gap:20px;
margin-top:10px;
}

.progress{
margin-top:10px;
height:8px;
background:#111;
border-radius:5px;
overflow:hidden;
}

.bar{
height:8px;
width:0%;
background:#ff0000;
box-shadow:0 0 10px #ff0000;
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">

<h1>CYBER VALIDATOR</h1>

<textarea id="input" placeholder="pega números aquí..."></textarea>

<button onclick="start()">INICIAR VALIDACIÓN</button>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="stats">
<div>VALID ✔ <span id="ok">0</span></div>
<div>INVALID ✖ <span id="bad">0</span></div>
</div>

<div class="result" id="result"></div>

</div>

<script>

// LUHN
function luhn(n){

let arr=n.split('').reverse().map(x=>parseInt(x))
let sum=0

for(let i=0;i<arr.length;i++){

let d=arr[i]

if(i%2){
d*=2
if(d>9)d-=9
}

sum+=d
}

return sum%10===0
}

// BULK CHECK
function start(){

let lines=document.getElementById("input").value.split("\n")
let result=document.getElementById("result")

let ok=0
let bad=0
let i=0

result.innerHTML=""

function loop(){

if(i>=lines.length)return

let num=lines[i].trim()

if(num){

if(luhn(num)){

result.innerHTML+=`<div class="valid">[LIVE] ${num}</div>`
ok++

}else{

result.innerHTML+=`<div class="invalid">[DIE] ${num}</div>`
bad++

}

document.getElementById("ok").innerText=ok
document.getElementById("bad").innerText=bad

}

let progress=(i/lines.length)*100
document.getElementById("bar").style.width=progress+"%"

result.scrollTop=result.scrollHeight

i++

setTimeout(loop,200)

}

loop()

}

// PARTICLES

const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<150;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speedX:(Math.random()-0.5),
speedY:(Math.random()-0.5)
})

}

function animate(){

ctx.fillStyle="rgba(0,0,0,0.3)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#ff0000"

particles.forEach(p=>{

p.x+=p.speedX
p.y+=p.speedY

if(p.x<0||p.x>canvas.width)p.speedX*=-1
if(p.y<0||p.y>canvas.height)p.speedY*=-1

ctx.beginPath()
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fill()

})

requestAnimationFrame(animate)

}

animate()

window.onresize=()=>{
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}

</script>

</body>
</html>
